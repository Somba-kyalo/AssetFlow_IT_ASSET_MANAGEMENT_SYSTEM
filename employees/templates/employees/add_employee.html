{% extends 'base.html' %}
{% load static %}

{% block title %}Add Employee | AssetFlow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/add_employee.css' %}">
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row mb-4">

        <div class="col-md-8">

            <h2 class="fw-bold">Add Employee</h2>

            <p class="text-muted">
                Register a new employee in the AssetFlow system.
            </p>

        </div>

        <div class="col-md-4 text-end">

            <a href="{% url 'employees' %}" class="btn btn-secondary">

                <i class="bi bi-arrow-left"></i>

                Back

            </a>

        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-header">

            <h5 class="mb-0">Employee Information</h5>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Employee ID</label>

                        <input type="text" name="employee_id" class="form-control" placeholder="EMP001" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Full Name</label>

                        <input type="text" name="full_name" class="form-control" placeholder="Enter full name" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Email Address</label>

                        <input type="email" name="email" class="form-control" placeholder="employee@example.com" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Phone Number</label>

                        <input type="text" name="phone" class="form-control" placeholder="+254700000000">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Department</label>

                        <select name="department" class="form-select">

                            <option value="">Select Department</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Position</label>

                        <input type="text" name="position" class="form-control" placeholder="e.g. Network Administrator">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Employment Date</label>

                        <input type="date" name="employment_date" class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Status</label>

                        <select name="status" class="form-select">

                            <option value="Active">Active</option>

                            <option value="Inactive">Inactive</option>

                        </select>

                    </div>

                    <div class="col-md-12 mb-3">

                        <label class="form-label">Address</label>

                        <textarea name="address" class="form-control" rows="3" placeholder="Enter employee address"></textarea>

                    </div>

                </div>

                <div class="text-end">

                    <button type="reset" class="btn btn-warning">

                        <i class="bi bi-arrow-clockwise"></i>

                        Reset

                    </button>

                    <button type="submit" class="btn btn-primary">

                        <i class="bi bi-save"></i>

                        Save Employee

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
