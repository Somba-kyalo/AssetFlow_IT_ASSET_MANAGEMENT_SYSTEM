{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Employee | AssetFlow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/edit_employee.css' %}">
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row mb-4">

        <div class="col-md-8">

            <h2 class="fw-bold">Edit Employee</h2>

            <p class="text-muted">
                Update employee information.
            </p>

        </div>

        <div class="col-md-4 text-end">

            <a href="{% url 'employees' %}" class="btn btn-secondary">

                <i class="bi bi-arrow-left"></i>

                Back

            </a>

        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-header">

            <h5 class="mb-0">Employee Information</h5>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Employee ID</label>

                        <input type="text" name="employee_id" class="form-control" value="{{ employee.employee_id }}" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Full Name</label>

                        <input type="text" name="full_name" class="form-control" value="{{ employee.full_name }}" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Email Address</label>

                        <input type="email" name="email" class="form-control" value="{{ employee.email }}" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Phone Number</label>

                        <input type="text" name="phone" class="form-control" value="{{ employee.phone }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Department</label>

                        <select name="department" class="form-select">

                            <option selected>{{ employee.department }}</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Position</label>

                        <input type="text" name="position" class="form-control" value="{{ employee.position }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Employment Date</label>

                        <input type="date" name="employment_date" class="form-control" value="{{ employee.employment_date|date:'Y-m-d' }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Status</label>

                        <select name="status" class="form-select">

                            <option {% if employee.status == "Active" %}selected{% endif %}>Active</option>

                            <option {% if employee.status == "Inactive" %}selected{% endif %}>Inactive</option>

                        </select>

                    </div>

                    <div class="col-md-12 mb-3">

                        <label class="form-label">Address</label>

                        <textarea name="address" rows="3" class="form-control">{{ employee.address }}</textarea>

                    </div>

                </div>

                <div class="text-end">

                    <button type="reset" class="btn btn-warning">

                        <i class="bi bi-arrow-clockwise"></i>

                        Reset

                    </button>

                    <button type="submit" class="btn btn-primary">

                        <i class="bi bi-save"></i>

                        Update Employee

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
