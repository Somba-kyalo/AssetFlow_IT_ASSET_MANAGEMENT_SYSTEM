{% extends 'base.html' %}
{% load static %}

{% block title %}Add Asset | AssetFlow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/add_asset.css' %}">
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row mb-4">

        <div class="col-md-12">

            <h2 class="fw-bold">Register New Asset</h2>

            <p class="text-muted">
                Add a new IT asset into the inventory.
            </p>

        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-header">

            <h5 class="mb-0">
                Asset Information
            </h5>

        </div>

        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Asset Name</label>

                        <input type="text" name="name" class="form-control" placeholder="Enter asset name" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Asset Tag</label>

                        <input type="text" name="asset_tag" class="form-control" placeholder="e.g. AF-0001" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Serial Number</label>

                        <input type="text" name="serial_number" class="form-control" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Category</label>

                        <select name="category" class="form-select">

                            <option value="">Select Category</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Brand</label>

                        <input type="text" name="brand" class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Model</label>

                        <input type="text" name="model" class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Department</label>

                        <select name="department" class="form-select">

                            <option value="">Select Department</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Supplier</label>

                        <select name="supplier" class="form-select">

                            <option value="">Select Supplier</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Purchase Date</label>

                        <input type="date" name="purchase_date" class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Purchase Cost</label>

                        <input type="number" step="0.01" name="purchase_cost" class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Warranty Expiry</label>

                        <input type="date" name="warranty_expiry" class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Status</label>

                        <select name="status" class="form-select">

                            <option>Available</option>
                            <option>Assigned</option>
                            <option>Maintenance</option>
                            <option>Retired</option>

                        </select>

                    </div>

                    <div class="col-md-12 mb-3">

                        <label class="form-label">Description</label>

                        <textarea name="description" rows="4" class="form-control" placeholder="Asset description"></textarea>

                    </div>

                    <div class="col-md-12 mb-4">

                        <label class="form-label">Asset Image</label>

                        <input type="file" name="image" class="form-control">

                    </div>

                </div>

                <div class="text-end">

                    <a href="{% url 'assets' %}" class="btn btn-secondary">

                        <i class="bi bi-arrow-left"></i>

                        Cancel

                    </a>

                    <button type="reset" class="btn btn-warning">

                        <i class="bi bi-arrow-clockwise"></i>

                        Reset

                    </button>

                    <button type="submit" class="btn btn-primary">

                        <i class="bi bi-save"></i>

                        Save Asset

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
