{% extends 'base.html' %}
{% load static %}

{% block title %}Return Asset | AssetFlow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/return_asset.css' %}">
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row mb-4">

        <div class="col-md-8">

            <h2 class="fw-bold">Return Asset</h2>

            <p class="text-muted">
                Record the return of an assigned IT asset.
            </p>

        </div>

        <div class="col-md-4 text-end">

            <a href="{% url 'asset_assignment' %}" class="btn btn-secondary">

                <i class="bi bi-arrow-left"></i>

                Back

            </a>

        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-header">

            <h5 class="mb-0">

                Return Details

            </h5>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Asset</label>

                        <select name="asset" class="form-select" required>

                            <option value="">Select Asset</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Employee</label>

                        <select name="employee" class="form-select" required>

                            <option value="">Select Employee</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Return Date</label>

                        <input type="date" name="return_date" class="form-control" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Received By</label>

                        <input type="text" name="received_by" class="form-control" value="{{ request.user.get_full_name }}" readonly>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Asset Condition</label>

                        <select name="condition" class="form-select">

                            <option>Excellent</option>
                            <option>Good</option>
                            <option>Fair</option>
                            <option>Damaged</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Status After Return</label>

                        <select name="status" class="form-select">

                            <option>Available</option>
                            <option>Maintenance</option>
                            <option>Retired</option>

                        </select>

                    </div>

                    <div class="col-md-12 mb-3">

                        <label class="form-label">Remarks</label>

                        <textarea name="remarks" rows="4" class="form-control" placeholder="Enter return remarks..."></textarea>

                    </div>

                    <div class="col-md-12 mb-3">

                        <div class="form-check">

                            <input class="form-check-input" type="checkbox" id="confirm" required>

                            <label class="form-check-label" for="confirm">

                                I confirm that I have received the asset and verified its condition.

                            </label>

                        </div>

                    </div>

                </div>

                <div class="text-end">

                    <button type="reset" class="btn btn-warning">

                        <i class="bi bi-arrow-clockwise"></i>

                        Reset

                    </button>

                    <button type="submit" class="btn btn-success">

                        <i class="bi bi-check-circle"></i>

                        Return Asset

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
