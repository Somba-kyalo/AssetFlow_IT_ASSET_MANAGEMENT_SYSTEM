{% extends 'base.html' %}
{% load static %}

{% block title %}Assign Asset | AssetFlow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/assign_asset.css' %}">
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row mb-4">

        <div class="col-md-8">

            <h2 class="fw-bold">Assign Asset</h2>

            <p class="text-muted">
                Assign an IT asset to an employee.
            </p>

        </div>

        <div class="col-md-4 text-end">

            <a href="{% url 'asset_assignment' %}" class="btn btn-secondary">

                <i class="bi bi-arrow-left"></i>

                Back

            </a>

        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-header">

            <h5 class="mb-0">Assignment Details</h5>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Asset</label>

                        <select name="asset" class="form-select" required>

                            <option value="">Select Asset</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Employee</label>

                        <select name="employee" class="form-select" required>

                            <option value="">Select Employee</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Department</label>

                        <select name="department" class="form-select">

                            <option value="">Select Department</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Assigned By</label>

                        <input type="text" name="assigned_by" class="form-control" value="{{ request.user.get_full_name }}" readonly>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Assignment Date</label>

                        <input type="date" name="assignment_date" class="form-control" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Expected Return Date</label>

                        <input type="date" name="return_date" class="form-control">

                    </div>

                    <div class="col-md-12 mb-3">

                        <label class="form-label">Purpose / Remarks</label>

                        <textarea name="remarks" rows="4" class="form-control" placeholder="Enter assignment remarks..."></textarea>

                    </div>

                    <div class="col-md-12 mb-3">

                        <div class="form-check">

                            <input class="form-check-input" type="checkbox" id="agreement" required>

                            <label class="form-check-label" for="agreement">

                                I confirm that the asset has been issued in good condition.

                            </label>

                        </div>

                    </div>

                </div>

                <div class="text-end">

                    <button type="reset" class="btn btn-warning">

                        <i class="bi bi-arrow-clockwise"></i>

                        Reset

                    </button>

                    <button type="submit" class="btn btn-primary">

                        <i class="bi bi-check-circle"></i>

                        Assign Asset

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
