{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Asset | AssetFlow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/edit_asset.css' %}">
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row mb-4">

        <div class="col-md-8">

            <h2 class="fw-bold">Edit Asset</h2>

            <p class="text-muted">
                Update the information of an existing IT asset.
            </p>

        </div>

        <div class="col-md-4 text-end">

            <a href="{% url 'assets' %}" class="btn btn-secondary">

                <i class="bi bi-arrow-left"></i>

                Back

            </a>

        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-header">

            <h5 class="mb-0">

                Asset Information

            </h5>

        </div>

        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Asset Name</label>

                        <input type="text" name="name" class="form-control" value="{{ asset.name }}" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Asset Tag</label>

                        <input type="text" name="asset_tag" class="form-control" value="{{ asset.asset_tag }}" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Serial Number</label>

                        <input type="text" name="serial_number" class="form-control" value="{{ asset.serial_number }}" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Category</label>

                        <select name="category" class="form-select">

                            <option selected>{{ asset.category }}</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Brand</label>

                        <input type="text" name="brand" class="form-control" value="{{ asset.brand }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Model</label>

                        <input type="text" name="model" class="form-control" value="{{ asset.model }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Department</label>

                        <select name="department" class="form-select">

                            <option selected>{{ asset.department }}</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Supplier</label>

                        <select name="supplier" class="form-select">

                            <option selected>{{ asset.supplier }}</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Purchase Date</label>

                        <input type="date" name="purchase_date" class="form-control" value="{{ asset.purchase_date|date:'Y-m-d' }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Purchase Cost</label>

                        <input type="number" step="0.01" name="purchase_cost" class="form-control" value="{{ asset.purchase_cost }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Warranty Expiry</label>

                        <input type="date" name="warranty_expiry" class="form-control" value="{{ asset.warranty_expiry|date:'Y-m-d' }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Status</label>

                        <select name="status" class="form-select">

                            <option {% if asset.status == "Available" %}selected{% endif %}>Available</option>
                            <option {% if asset.status == "Assigned" %}selected{% endif %}>Assigned</option>
                            <option {% if asset.status == "Maintenance" %}selected{% endif %}>Maintenance</option>
                            <option {% if asset.status == "Retired" %}selected{% endif %}>Retired</option>

                        </select>

                    </div>

                    <div class="col-md-12 mb-3">

                        <label class="form-label">Description</label>

                        <textarea name="description" rows="4" class="form-control">{{ asset.description }}</textarea>

                    </div>

                    <div class="col-md-12 mb-4">

                        <label class="form-label">Asset Image</label>

                        <input type="file" name="image" class="form-control">

                    </div>

                </div>

                <div class="text-end">

                    <button type="reset" class="btn btn-warning">

                        <i class="bi bi-arrow-clockwise"></i>

                        Reset

                    </button>

                    <button type="submit" class="btn btn-primary">

                        <i class="bi bi-save"></i>

                        Update Asset

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
