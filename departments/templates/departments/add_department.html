{% extends 'base.html' %}
{% load static %}

{% block title %}Add Department | AssetFlow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/add_department.css' %}">
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row mb-4">

        <div class="col-md-8">

            <h2 class="fw-bold">Add Department</h2>

            <p class="text-muted">
                Create a new department within the organization.
            </p>

        </div>

        <div class="col-md-4 text-end">

            <a href="{% url 'departments' %}" class="btn btn-secondary">

                <i class="bi bi-arrow-left"></i>

                Back

            </a>

        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-header">

            <h5 class="mb-0">Department Information</h5>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Department Name</label>

                        <input type="text" name="name" class="form-control" placeholder="Enter department name" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Department Code</label>

                        <input type="text" name="code" class="form-control" placeholder="e.g ICT001" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Department Manager</label>

                        <select name="manager" class="form-select">

                            <option value="">Select Manager</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Email Address</label>

                        <input type="email" name="email" class="form-control" placeholder="department@example.com">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Phone Number</label>

                        <input type="text" name="phone" class="form-control" placeholder="+254700000000">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Office Location</label>

                        <input type="text" name="location" class="form-control" placeholder="Building / Floor / Office">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Status</label>

                        <select name="status" class="form-select">

                            <option value="Active">Active</option>

                            <option value="Inactive">Inactive</option>

                        </select>

                    </div>

                    <div class="col-md-12 mb-3">

                        <label class="form-label">Description</label>

                        <textarea name="description" class="form-control" rows="4" placeholder="Enter department description"></textarea>

                    </div>

                </div>

                <div class="text-end">

                    <button type="reset" class="btn btn-warning">

                        <i class="bi bi-arrow-clockwise"></i>

                        Reset

                    </button>

                    <button type="submit" class="btn btn-primary">

                        <i class="bi bi-save"></i>

                        Save Department

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
