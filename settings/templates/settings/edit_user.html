{% extends 'base.html' %}
{% load static %}

{% block title %}Edit User | AssetFlow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/edit_user.css' %}">
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row mb-4">

        <div class="col-md-8">

            <h2 class="fw-bold">Edit User</h2>

            <p class="text-muted">
                Update user account information.
            </p>

        </div>

        <div class="col-md-4 text-end">

            <a href="{% url 'users' %}" class="btn btn-secondary">

                <i class="bi bi-arrow-left"></i>

                Back

            </a>

        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-header">

            <h5 class="mb-0">User Information</h5>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">First Name</label>

                        <input type="text"
                               name="first_name"
                               class="form-control"
                               value="{{ user.first_name }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Last Name</label>

                        <input type="text"
                               name="last_name"
                               class="form-control"
                               value="{{ user.last_name }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Username</label>

                        <input type="text"
                               name="username"
                               class="form-control"
                               value="{{ user.username }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Email Address</label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               value="{{ user.email }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Role</label>

                        <select name="role" class="form-select">

                            <option {% if user.role == "Administrator" %}selected{% endif %}>Administrator</option>

                            <option {% if user.role == "ICT Officer" %}selected{% endif %}>ICT Officer</option>

                            <option {% if user.role == "Asset Manager" %}selected{% endif %}>Asset Manager</option>

                            <option {% if user.role == "Department Head" %}selected{% endif %}>Department Head</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Status</label>

                        <select name="status" class="form-select">

                            <option {% if user.status == "Active" %}selected{% endif %}>Active</option>

                            <option {% if user.status == "Inactive" %}selected{% endif %}>Inactive</option>

                        </select>

                    </div>

                </div>

                <div class="text-end">

                    <button type="reset" class="btn btn-warning">

                        <i class="bi bi-arrow-clockwise"></i>

                        Reset

                    </button>

                    <button type="submit" class="btn btn-primary">

                        <i class="bi bi-check-circle"></i>

                        Update User

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
