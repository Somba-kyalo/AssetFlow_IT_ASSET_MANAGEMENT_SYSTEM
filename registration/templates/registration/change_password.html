{% extends 'base.html' %}
{% load static %}

{% block title %}Change Password | AssetFlow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/change_password.css' %}">
{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center align-items-center change-password-container">

        <div class="col-lg-6 col-md-8">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <i class="bi bi-lock-fill change-password-icon"></i>

                        <h2>Change Password</h2>

                        <p class="text-muted">
                            Update your password to keep your account secure.
                        </p>

                    </div>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Current Password
                            </label>

                            <input type="password" name="old_password" class="form-control" placeholder="Enter current password" required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                New Password
                            </label>

                            <input type="password" name="new_password1" class="form-control" placeholder="Enter new password" required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Confirm New Password
                            </label>

                            <input type="password" name="new_password2" class="form-control" placeholder="Confirm new password" required>

                        </div>

                        <div class="d-grid">

                            <button type="submit" class="btn btn-primary">

                                <i class="bi bi-key-fill"></i>

                                Change Password

                            </button>

                        </div>

                    </form>

                    <hr>

                    <div class="text-center">

                        <a href="{% url 'profile' %}">
                            <i class="bi bi-person-circle"></i>
                            Back to Profile
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
