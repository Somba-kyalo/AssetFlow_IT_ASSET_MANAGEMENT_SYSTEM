{% extends 'base.html' %}
{% load static %}

{% block title %}Logout | AssetFlow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/logout.css' %}">
{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center align-items-center logout-container">

        <div class="col-lg-5 col-md-7">

            <div class="card shadow-lg border-0">

                <div class="card-body text-center p-5">

                    <i class="bi bi-box-arrow-right logout-icon"></i>

                    <h2 class="mt-4">
                        Logout
                    </h2>

                    <p class="text-muted mb-4">
                        Are you sure you want to log out of your AssetFlow account?
                    </p>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="d-grid gap-3">

                            <button type="submit" class="btn btn-danger">

                                <i class="bi bi-box-arrow-right"></i>

                                Logout

                            </button>

                            <a href="{% url 'home' %}" class="btn btn-outline-secondary">

                                <i class="bi bi-arrow-left"></i>

                                Cancel

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
