{% extends 'base.html' %}
{% load static %}

{% block title %}Reset Password | AssetFlow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/reset_password.css' %}">
{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center align-items-center reset-password-container">

        <div class="col-lg-5 col-md-7">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <i class="bi bi-shield-lock-fill reset-password-icon"></i>

                        <h2>Reset Password</h2>

                        <p class="text-muted">
                            Enter your new password below.
                        </p>

                    </div>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                New Password
                            </label>

                            <input type="password" name="new_password1" class="form-control" placeholder="Enter new password" required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Confirm New Password
                            </label>

                            <input type="password" name="new_password2" class="form-control" placeholder="Confirm new password" required>

                        </div>

                        <div class="d-grid">

                            <button type="submit" class="btn btn-primary">

                                <i class="bi bi-check-circle-fill"></i>

                                Reset Password

                            </button>

                        </div>

                    </form>

                    <hr>

                    <div class="text-center">

                        <a href="{% url 'login' %}">
                            <i class="bi bi-arrow-left"></i>
                            Back to Login
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
