{% extends 'base.html' %}
{% load static %}

{% block title %}Register | AssetFlow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/register.css' %}">
{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center align-items-center register-container">

        <div class="col-lg-7 col-md-9">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <i class="bi bi-person-plus-fill register-icon"></i>

                        <h2>Create Account</h2>

                        <p class="text-muted">
                            Register to start using AssetFlow
                        </p>

                    </div>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">First Name</label>

                                <input type="text" name="first_name" class="form-control" placeholder="Enter first name" required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">Last Name</label>

                                <input type="text" name="last_name" class="form-control" placeholder="Enter last name" required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Username</label>

                            <input type="text" name="username" class="form-control" placeholder="Choose a username" required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Email Address</label>

                            <input type="email" name="email" class="form-control" placeholder="Enter email address" required>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">Password</label>

                                <input type="password" name="password1" class="form-control" placeholder="Enter password" required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">Confirm Password</label>

                                <input type="password" name="password2" class="form-control" placeholder="Confirm password" required>

                            </div>

                        </div>

                        <div class="form-check mb-4">

                            <input class="form-check-input" type="checkbox" id="terms" required>

                            <label class="form-check-label" for="terms">
                                I agree to the Terms and Conditions
                            </label>

                        </div>

                        <div class="d-grid">

                            <button type="submit" class="btn btn-primary">

                                <i class="bi bi-person-check-fill"></i>

                                Register

                            </button>

                        </div>

                    </form>

                    <hr>

                    <p class="text-center mb-0">

                        Already have an account?

                        <a href="{% url 'login' %}">Login</a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
