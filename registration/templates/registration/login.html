{% extends 'base.html' %}
{% load static %}

{% block title %}Login | AssetFlow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center align-items-center login-container">

        <div class="col-lg-5 col-md-7">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <i class="bi bi-shield-lock-fill login-icon"></i>

                        <h2 class="mt-3">AssetFlow</h2>

                        <p class="text-muted">
                            Sign in to continue
                        </p>

                    </div>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input type="text" name="username" class="form-control" placeholder="Enter username" required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>

                        </div>

                        <div class="d-flex justify-content-between mb-4">

                            <div class="form-check">

                                <input class="form-check-input" type="checkbox" id="remember">

                                <label class="form-check-label" for="remember">
                                    Remember Me
                                </label>

                            </div>

                            <a href="{% url 'forgot_password' %}">
                                Forgot Password?
                            </a>

                        </div>

                        <div class="d-grid">

                            <button type="submit" class="btn btn-primary">

                                <i class="bi bi-box-arrow-in-right"></i>

                                Login

                            </button>

                        </div>

                    </form>

                    <hr>

                    <p class="text-center mb-0">

                        Don't have an account?

                        <a href="{% url 'register' %}">
                            Register
                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
