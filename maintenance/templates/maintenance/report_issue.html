{% extends 'base.html' %}
{% load static %}

{% block title %}Report Issue | AssetFlow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/report_issue.css' %}">
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row mb-4">

        <div class="col-md-8">

            <h2 class="fw-bold">Report Asset Issue</h2>

            <p class="text-muted">
                Submit a new issue for an asset requiring maintenance.
            </p>

        </div>

        <div class="col-md-4 text-end">

            <a href="{% url 'maintenance' %}" class="btn btn-secondary">

                <i class="bi bi-arrow-left"></i>

                Back

            </a>

        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-header">

            <h5 class="mb-0">Issue Information</h5>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Asset</label>

                        <select name="asset" class="form-select">

                            <option>Select Asset</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Reported By</label>

                        <select name="employee" class="form-select">

                            <option>Select Employee</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Issue Category</label>

                        <select name="category" class="form-select">

                            <option>Hardware</option>

                            <option>Software</option>

                            <option>Network</option>

                            <option>Peripheral</option>

                            <option>Other</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Priority</label>

                        <select name="priority" class="form-select">

                            <option>Low</option>

                            <option>Medium</option>

                            <option>High</option>

                            <option>Critical</option>

                        </select>

                    </div>

                    <div class="col-md-12 mb-3">

                        <label class="form-label">Issue Description</label>

                        <textarea name="description" rows="5" class="form-control" placeholder="Describe the problem in detail..."></textarea>

                    </div>

                </div>

                <div class="text-end">

                    <button type="reset" class="btn btn-warning">

                        <i class="bi bi-arrow-clockwise"></i>

                        Reset

                    </button>

                    <button type="submit" class="btn btn-danger">

                        <i class="bi bi-send"></i>

                        Submit Issue

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
