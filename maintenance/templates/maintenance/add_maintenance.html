{% extends 'base.html' %}
{% load static %}

{% block title %}Add Maintenance | AssetFlow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/add_maintenance.css' %}">
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row mb-4">

        <div class="col-md-8">

            <h2 class="fw-bold">Add Maintenance Request</h2>

            <p class="text-muted">
                Record a new maintenance request for an IT asset.
            </p>

        </div>

        <div class="col-md-4 text-end">

            <a href="{% url 'maintenance' %}" class="btn btn-secondary">

                <i class="bi bi-arrow-left"></i>

                Back

            </a>

        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-header">

            <h5 class="mb-0">Maintenance Information</h5>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Asset</label>

                        <select name="asset" class="form-select">

                            <option>Select Asset</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Reported By</label>

                        <select name="employee" class="form-select">

                            <option>Select Employee</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Priority</label>

                        <select name="priority" class="form-select">

                            <option>Low</option>

                            <option>Medium</option>

                            <option>High</option>

                            <option>Critical</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Maintenance Date</label>

                        <input type="date" name="maintenance_date" class="form-control">

                    </div>

                    <div class="col-md-12 mb-3">

                        <label class="form-label">Issue Description</label>

                        <textarea name="issue" rows="4" class="form-control" placeholder="Describe the issue..."></textarea>

                    </div>

                </div>

                <div class="text-end">

                    <button type="reset" class="btn btn-warning">

                        <i class="bi bi-arrow-clockwise"></i>

                        Reset

                    </button>

                    <button type="submit" class="btn btn-primary">

                        <i class="bi bi-save"></i>

                        Save Request

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
